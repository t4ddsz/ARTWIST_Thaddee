<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stanczyk AR</title>
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "stanczyk",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/stanczyk.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 640, "height": 476,
            "originalWidth": 640, "originalHeight": 476,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">
    <a-assets>
      <img id="vietnam" src="../assets/vietnam.png" crossorigin="anonymous">
    </a-assets>
    <a-camera position="0 4 10"></a-camera>
    <xrextras-named-image-target name="stanczyk">
      <a-image
        src="#vietnam"
        position="0 0 0.01"
        rotation="0 0 90"
        width="1.344"
        height="1"
        opacity="0"
        animation="property: opacity; from: 0; to: 1; dur: 5000; delay: 1000; easing: easeInOutSine">
      </a-image>
    </xrextras-named-image-target>
  </a-scene>
</body>
</html>
